name: Gesture Speak CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create regular dataset
        run: python create_dataset.py

      - name: Create KV dataset
        run: python create_datasetKV.py

      - name: Train the classifier
        run: python train_classifier.py

      - name: Train the KV classifier
        run: python trainKV_classifier.py

      - name: Run tests
        run: pytest -v tests/

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install streamlit

      - name: Deploy with Streamlit
        run: |
          streamlit run depl.py &
          sleep 5
          echo "Stopping Streamlit after 5 seconds."
          pkill -f "streamlit run depl.py"
